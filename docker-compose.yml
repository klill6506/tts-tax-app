services:
  db:
    image: postgres:16
    container_name: tts_tax_db
    environment:
      POSTGRES_DB: tts_tax
      POSTGRES_USER: tts
      POSTGRES_PASSWORD: tts_dev_pw_change_me
    ports:
      - "5432:5432"
    volumes:
      - tts_tax_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tts -d tts_tax"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tts_tax_pgdata:
